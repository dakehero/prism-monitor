name: Prism Monitor CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version, for example 0.5.0"
        required: false
        default: "0.5.0"

permissions:
  contents: write

env:
  DOTNET_VERSION: "10.0.x"
  SOLUTION: PrismMonitor.slnx
  APP_PROJECT: src/PrismMonitor.App/PrismMonitor.App.csproj
  TEST_PROJECT: tests/PrismMonitor.Core.Tests/PrismMonitor.Core.Tests.csproj
  PACKAGE_MANIFEST: src/PrismMonitor.App/Package.appxmanifest
  PACKAGE_SUBJECT: CN=dakehero

jobs:
  test:
    name: Test and build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore $env:SOLUTION

      - name: Test
        run: dotnet test $env:TEST_PROJECT --configuration Release --no-restore

      - name: Build app for Windows ARM64
        run: dotnet build $env:APP_PROJECT --configuration Release --runtime win-arm64 --self-contained true

  package-msix:
    name: Package MSIX
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore package dependencies
        run: dotnet restore $env:APP_PROJECT

      - name: Patch MSIX build task dependencies
        shell: pwsh
        run: |
          $permissions = Get-ChildItem -LiteralPath "$env:USERPROFILE\.nuget\packages\system.security.permissions\8.0.0\lib" -Recurse -Filter System.Security.Permissions.dll |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $permissions) {
            throw "System.Security.Permissions.dll was not restored."
          }

          $msixBuild = Get-ChildItem -LiteralPath "$env:USERPROFILE\.nuget\packages\microsoft.windows.sdk.buildtools.msix" -Directory |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if (-not $msixBuild) {
            throw "Microsoft.Windows.SDK.BuildTools.MSIX was not restored."
          }

          $taskDirectories = Get-ChildItem -LiteralPath (Join-Path $msixBuild.FullName "tools") -Directory
          foreach ($directory in $taskDirectories) {
            Copy-Item -LiteralPath $permissions.FullName -Destination $directory.FullName -Force
            Write-Host "Copied $($permissions.Name) to $($directory.FullName)"
          }

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $version = $env:GITHUB_REF_NAME.TrimStart('v')
          } else {
            $version = '${{ github.event.inputs.version }}'
          }

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version '$version' must use major.minor.patch format."
          }

          $appxVersion = "$version.0"
          [xml]$manifest = Get-Content -LiteralPath $env:PACKAGE_MANIFEST
          $namespace = [System.Xml.XmlNamespaceManager]::new($manifest.NameTable)
          $namespace.AddNamespace("pkg", "http://schemas.microsoft.com/appx/manifest/foundation/windows10")
          $identity = $manifest.SelectSingleNode("/pkg:Package/pkg:Identity", $namespace)
          if (-not $identity) {
            throw "Package identity was not found in $env:PACKAGE_MANIFEST."
          }

          $identity.Version = $appxVersion
          $settings = [System.Xml.XmlWriterSettings]::new()
          $settings.Encoding = [System.Text.UTF8Encoding]::new($false)
          $settings.Indent = $true
          $writer = [System.Xml.XmlWriter]::Create((Resolve-Path -LiteralPath $env:PACKAGE_MANIFEST).Path, $settings)
          try {
            $manifest.Save($writer)
          } finally {
            $writer.Dispose()
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "appx_version=$appxVersion" >> $env:GITHUB_OUTPUT

      - name: Create signing certificate
        id: cert
        shell: pwsh
        run: |
          $root = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=Prism Monitor Local Test Root" `
            -KeyUsage CertSign, CRLSign, DigitalSignature `
            -KeyExportPolicy Exportable `
            -FriendlyName "Prism Monitor Local Test Root" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.19={critical}{text}ca=1&pathlength=0") `
            -NotAfter (Get-Date).AddYears(3)

          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject $env:PACKAGE_SUBJECT `
            -Signer $root `
            -KeyUsage DigitalSignature `
            -KeyExportPolicy Exportable `
            -FriendlyName "Prism Monitor MSIX Signing" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @(
              "2.5.29.19={critical}{text}ca=0",
              "2.5.29.37={text}1.3.6.1.5.5.7.3.3"
            ) `
            -NotAfter (Get-Date).AddYears(3)

          "root_thumbprint=$($root.Thumbprint)" >> $env:GITHUB_OUTPUT
          "thumbprint=$($cert.Thumbprint)" >> $env:GITHUB_OUTPUT

      - name: Publish signed MSIX
        shell: pwsh
        run: |
          dotnet publish $env:APP_PROJECT `
            --configuration Release `
            --runtime win-arm64 `
            --self-contained true `
            -p:PublishAot=true `
            -p:GenerateAppxPackageOnBuild=true `
            -p:AppxPackageSigningEnabled=true `
            -p:PackageCertificateThumbprint=${{ steps.cert.outputs.thumbprint }} `
            -p:AppxBundle=Never `
            -p:UapAppxPackageBuildMode=SideloadOnly `
            -p:AppxPackageDir=artifacts/msix/

      - name: Export local test root certificate
        shell: pwsh
        run: |
          $packageDir = Get-ChildItem -Path src/PrismMonitor.App/artifacts/msix -Directory | Select-Object -First 1
          if (-not $packageDir) {
            throw "MSIX package directory was not produced."
          }

          Export-Certificate `
            -Cert "Cert:\CurrentUser\My\${{ steps.cert.outputs.root_thumbprint }}" `
            -FilePath (Join-Path $packageDir.FullName "PrismMonitor.LocalTestRoot.cer") |
            Out-Null

      - name: Verify package payload
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $msix = Get-ChildItem -Path src/PrismMonitor.App/artifacts/msix -Recurse -Filter *.msix | Select-Object -First 1
          if (-not $msix) {
            throw "MSIX package was not produced."
          }

          $entries = [IO.Compression.ZipFile]::OpenRead($msix.FullName).Entries
          $unexpected = $entries | Where-Object { $_.FullName -match 'onnx|DirectML|MachineLearning' }
          if ($unexpected) {
            $unexpected | ForEach-Object { Write-Error "Unexpected AI/ML payload: $($_.FullName)" }
            throw "MSIX contains AI/ML runtime payload."
          }

      - name: Bundle installer zip
        id: bundle
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $packageDir = Get-ChildItem -Path src/PrismMonitor.App/artifacts/msix -Directory | Select-Object -First 1
          if (-not $packageDir) {
            throw "MSIX package directory was not produced."
          }

          New-Item -ItemType Directory -Force -Path artifacts/releases | Out-Null
          $zip = "artifacts/releases/PrismMonitor-v$version-win-arm64-msix.zip"
          Compress-Archive -Path (Join-Path $packageDir.FullName '*') -DestinationPath $zip -Force

          "zip=$zip" >> $env:GITHUB_OUTPUT
          "name=PrismMonitor-v$version-win-arm64-msix.zip" >> $env:GITHUB_OUTPUT

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.bundle.outputs.name }}
          path: ${{ steps.bundle.outputs.zip }}

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $zip = '${{ steps.bundle.outputs.zip }}'
          $notes = @"
          ## Prism Monitor v$version

          Windows ARM64 MSIX release.

          ### Install
          1. Download ``PrismMonitor-v$version-win-arm64-msix.zip``.
          2. Extract it.
          3. Run ``Install.ps1`` from PowerShell to trust the self-signed certificate and install the MSIX.

          ### Validation
          - ``dotnet test`` passed in GitHub Actions
          - Release package was built as ``win-arm64`` Native AOT
          - MSIX payload check confirmed no AI/ML runtime files
          "@

          gh release create $env:GITHUB_REF_NAME $zip --title "Prism Monitor v$version" --notes $notes
