name: Native Guard CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version, for example 0.2.1"
        required: false
        default: "0.2.0"

permissions:
  contents: write

env:
  DOTNET_VERSION: "10.0.x"
  SOLUTION: NativeGuard.slnx
  APP_PROJECT: src/NativeGuard.App/NativeGuard.App.csproj
  TEST_PROJECT: tests/NativeGuard.Core.Tests/NativeGuard.Core.Tests.csproj
  PACKAGE_MANIFEST: src/NativeGuard.App/Package.appxmanifest
  PACKAGE_SUBJECT: CN=dakehero

jobs:
  test:
    name: Test and build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore $env:SOLUTION

      - name: Test
        run: dotnet test $env:TEST_PROJECT --configuration Release --no-restore

      - name: Build app for Windows ARM64
        run: dotnet build $env:APP_PROJECT --configuration Release --runtime win-arm64 --self-contained true

  package-msix:
    name: Package MSIX
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore package dependencies
        run: dotnet restore $env:APP_PROJECT

      - name: Patch MSIX build task dependencies
        shell: pwsh
        run: |
          $permissions = Get-ChildItem -LiteralPath "$env:USERPROFILE\.nuget\packages\system.security.permissions\8.0.0\lib" -Recurse -Filter System.Security.Permissions.dll |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $permissions) {
            throw "System.Security.Permissions.dll was not restored."
          }

          $msixBuild = Get-ChildItem -LiteralPath "$env:USERPROFILE\.nuget\packages\microsoft.windows.sdk.buildtools.msix" -Directory |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if (-not $msixBuild) {
            throw "Microsoft.Windows.SDK.BuildTools.MSIX was not restored."
          }

          Copy-Item -LiteralPath $permissions.FullName -Destination (Join-Path $msixBuild.FullName "build") -Force

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $version = $env:GITHUB_REF_NAME.TrimStart('v')
          } else {
            $version = '${{ github.event.inputs.version }}'
          }

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version '$version' must use major.minor.patch format."
          }

          $appxVersion = "$version.0"
          $manifest = Get-Content -LiteralPath $env:PACKAGE_MANIFEST -Raw
          $manifest = $manifest -replace 'Version="[^"]+"', "Version=`"$appxVersion`""
          Set-Content -LiteralPath $env:PACKAGE_MANIFEST -Value $manifest -NoNewline

          "version=$version" >> $env:GITHUB_OUTPUT
          "appx_version=$appxVersion" >> $env:GITHUB_OUTPUT

      - name: Create signing certificate
        id: cert
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject $env:PACKAGE_SUBJECT `
            -KeyUsage DigitalSignature `
            -FriendlyName "Native Guard MSIX Signing" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") `
            -NotAfter (Get-Date).AddYears(3)

          "thumbprint=$($cert.Thumbprint)" >> $env:GITHUB_OUTPUT

      - name: Publish signed MSIX
        shell: pwsh
        run: |
          dotnet publish $env:APP_PROJECT `
            --configuration Release `
            --runtime win-arm64 `
            --self-contained true `
            -p:PublishAot=true `
            -p:GenerateAppxPackageOnBuild=true `
            -p:AppxPackageSigningEnabled=true `
            -p:PackageCertificateThumbprint=${{ steps.cert.outputs.thumbprint }} `
            -p:AppxBundle=Never `
            -p:UapAppxPackageBuildMode=SideloadOnly `
            -p:AppxPackageDir=artifacts/msix/

      - name: Verify package payload
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $msix = Get-ChildItem -Path src/NativeGuard.App/artifacts/msix -Recurse -Filter *.msix | Select-Object -First 1
          if (-not $msix) {
            throw "MSIX package was not produced."
          }

          $entries = [IO.Compression.ZipFile]::OpenRead($msix.FullName).Entries
          $unexpected = $entries | Where-Object { $_.FullName -match 'onnx|DirectML|MachineLearning' }
          if ($unexpected) {
            $unexpected | ForEach-Object { Write-Error "Unexpected AI/ML payload: $($_.FullName)" }
            throw "MSIX contains AI/ML runtime payload."
          }

      - name: Bundle installer zip
        id: bundle
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $packageDir = Get-ChildItem -Path src/NativeGuard.App/artifacts/msix -Directory | Select-Object -First 1
          if (-not $packageDir) {
            throw "MSIX package directory was not produced."
          }

          New-Item -ItemType Directory -Force -Path artifacts/releases | Out-Null
          $zip = "artifacts/releases/NativeGuard-v$version-win-arm64-msix.zip"
          Compress-Archive -Path (Join-Path $packageDir.FullName '*') -DestinationPath $zip -Force

          "zip=$zip" >> $env:GITHUB_OUTPUT
          "name=NativeGuard-v$version-win-arm64-msix.zip" >> $env:GITHUB_OUTPUT

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.bundle.outputs.name }}
          path: ${{ steps.bundle.outputs.zip }}

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $zip = '${{ steps.bundle.outputs.zip }}'
          $notes = @"
          ## Native Guard v$version

          Windows ARM64 MSIX release.

          ### Install
          1. Download ``NativeGuard-v$version-win-arm64-msix.zip``.
          2. Extract it.
          3. Run ``Install.ps1`` from PowerShell to trust the self-signed certificate and install the MSIX.

          ### Validation
          - ``dotnet test`` passed in GitHub Actions
          - Release package was built as ``win-arm64`` Native AOT
          - MSIX payload check confirmed no AI/ML runtime files
          "@

          gh release create $env:GITHUB_REF_NAME $zip --title "Native Guard v$version" --notes $notes
